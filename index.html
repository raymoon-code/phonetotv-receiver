<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneToTV - Web Receiver</title>
    <!-- Import thư viện hls.js để giải mã m3u8 trên các trình duyệt không hỗ trợ trực tiếp -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video styling */
        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            z-index: 10;
        }

        /* Glassmorphic Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 90%;
            max-width: 640px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 5;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        /* Pairing Code Display */
        .code-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .pairing-code {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 24px;
            font-family: "Courier New", Courier, monospace;
        }

        /* Instructions */
        .instructions {
            font-size: 16px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 32px;
        }

        .instructions span {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Status Indicator */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #e2e8f0;
            box-shadow: 0 0 8px #e2e8f0;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; box-shadow: 0 0 4px #10b981; }
            to { opacity: 1; box-shadow: 0 0 12px #10b981; }
        }

        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- Native HTML5 Video Element -->
    <video id="videoPlayer" controls autoplay playsinline></video>

    <!-- Glassmorphic Pairing UI -->
    <div class="glass-panel" id="pairingUI">
        <div class="logo">PHONETOTV RECEIVER</div>
        <div class="code-title">Mã ghép đôi của TV</div>
        <div class="pairing-code" id="codeDisplay">----</div>
        <p class="instructions">
            Mở ứng dụng <span>PhoneToTV</span> trên điện thoại của bạn,<br>
            chọn mục tiêu cast là <span>Web Browser</span> và nhập mã số ở trên.
        </p>
        <div class="status-container">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">ĐANG KHỞI TẠO...</div>
        </div>
    </div>

    <!-- On-screen Developer Console for Smart TV debugging -->
    <div id="debugConsole" style="position: absolute; bottom: 10px; left: 10px; right: 10px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.85); color: #10b981; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 12px; z-index: 100; text-align: left; border: 1px solid rgba(16, 185, 129, 0.25); display: none; word-break: break-all; pointer-events: none;"></div>

    <script>
        var video = document.getElementById('videoPlayer');
        var pairingUI = document.getElementById('pairingUI');
        var codeDisplay = document.getElementById('codeDisplay');
        var statusDot = document.getElementById('statusDot');
        var statusText = document.getElementById('statusText');
        var debugConsole = document.getElementById('debugConsole');
        
        function logToScreen(msg, type) {
            debugConsole.style.display = 'block';
            var div = document.createElement('div');
            var color = '#10b981'; // Green
            if (type === 'error') color = '#ef4444'; // Red
            if (type === 'warn') color = '#f59e0b'; // Yellow
            div.style.color = color;
            div.style.marginBottom = '4px';
            div.innerText = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            debugConsole.appendChild(div);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        // Hook console methods
        var _log = console.log;
        var _error = console.error;
        var _warn = console.warn;
        
        function stringifyArgs(args) {
            var processed = [];
            for (var i = 0; i < args.length; i++) {
                var arg = args[i];
                if (typeof arg === 'object' && arg !== null) {
                    try {
                        processed.push(JSON.stringify(arg));
                    } catch(e) {
                        processed.push('[Object]');
                    }
                } else {
                    processed.push(arg);
                }
            }
            return processed.join(' ');
        }

        console.log = function() {
            var args = Array.prototype.slice.call(arguments);
            _log.apply(console, args);
            logToScreen(stringifyArgs(args), 'log');
        };
        console.error = function() {
            var args = Array.prototype.slice.call(arguments);
            _error.apply(console, args);
            logToScreen(stringifyArgs(args), 'error');
        };
        console.warn = function() {
            var args = Array.prototype.slice.call(arguments);
            _warn.apply(console, args);
            logToScreen(stringifyArgs(args), 'warn');
        };

        // Window error tracking
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("Runtime: " + message + " at " + source + ":" + lineno);
            return false;
        };
        
        var hls = null;
        var sse = null;
        var pairCode = '';
        var isPhoneConnected = false;
        var lastHeartbeatTime = Date.now();
        var sseTimeout = null;
        var sseConnectedOnce = false;
        var processedMsgIds = {};
        var isShortPollingActive = false;

        // 1. Tạo mã ngẫu nhiên 4 chữ số (hoặc lấy từ bộ nhớ trình duyệt TV để giữ nguyên mã khi refresh)
        function generateCode() {
            var savedCode = null;
            try {
                savedCode = localStorage.getItem('phonetotv_pairing_code');
            } catch(e) {}
            
            if (savedCode && savedCode.length === 4 && !isNaN(savedCode)) {
                pairCode = savedCode;
                console.log("Sử dụng mã PIN cũ đã lưu: " + pairCode);
            } else {
                pairCode = String(Math.floor(1000 + Math.random() * 9000));
                try {
                    localStorage.setItem('phonetotv_pairing_code', pairCode);
                } catch(e) {}
                console.log("Sinh mã PIN mới: " + pairCode);
            }
            
            codeDisplay.innerText = pairCode;
            statusText.innerText = 'SẴN SÀNG GHÉP ĐÔI';
            initSignaling();
        }

        // Helper gửi dữ liệu bằng fetch POST no-cors (đúng chuẩn ntfy API và bypass CORS trên TV cổ)
        function httpPost(url, payload) {
            var bodyString = typeof payload === 'string' ? payload : JSON.stringify(payload);
            console.log("Sending status to phone: " + bodyString);
            
            if (typeof fetch !== 'undefined') {
                fetch(url, {
                    method: 'POST',
                    body: bodyString,
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain; charset=utf-8'
                    }
                }).catch(function(e) {
                    console.error("Fetch sending error:", e);
                });
            } else {
                // Fallback XMLHTTP if fetch is absent
                try {
                    var xhr = new XMLHttpRequest();
                    xhr.open('POST', url, true);
                    xhr.setRequestHeader('Content-Type', 'text/plain; charset=utf-8');
                    xhr.send(bodyString);
                } catch(e) {
                    console.error("XHR sending error:", e);
                }
            }
        }

        // 2. Thiết lập kênh tín hiệu (Signaling Channel) qua ntfy.tedomum.fr SSE (Server-Sent Events)
        function initSignaling() {
            if (sse) {
                try { sse.close(); } catch(e) {}
            }
            if (sseTimeout) {
                clearTimeout(sseTimeout);
            }
            
            var topic = 'ntfy-phonetotv-' + pairCode + '-tv';
            var sseUrl = 'https://ntfy.tedomum.fr/' + topic + '/json';
            
            console.log("Subscribing to: " + sseUrl);
            
            if (typeof EventSource !== 'undefined') {
                sse = new EventSource(sseUrl);
                
                // Sau 6 giây nếu SSE chưa hoạt động, tự động chuyển sang Short Polling
                sseTimeout = setTimeout(function() {
                    if (!sseConnectedOnce) {
                        console.warn("SSE không phản hồi sau 6s. Fallback sang Short Polling.");
                        try { sse.close(); } catch(e) {}
                        sse = null;
                        startShortPolling();
                    }
                }, 6000);
                
                sse.onopen = function() {
                    console.log("Kênh tín hiệu SSE đã mở.");
                    sseConnectedOnce = true;
                    if (sseTimeout) clearTimeout(sseTimeout);
                    
                    sendStatusToPhone({
                        type: 'heartbeat',
                        status: 'idle',
                        tv_connected: true
                    });
                };
                
                sse.onmessage = function(event) {
                    sseConnectedOnce = true;
                    if (sseTimeout) clearTimeout(sseTimeout);
                    try {
                        var msg = JSON.parse(event.data);
                        if (msg.event === 'message' && msg.message) {
                            // Lọc trùng theo id
                            if (msg.id) {
                                if (processedMsgIds[msg.id]) {
                                    return;
                                }
                                processedMsgIds[msg.id] = true;
                            }
                            var payload = JSON.parse(msg.message);
                            handleControlCommand(payload);
                        }
                    } catch (e) {
                        console.error("Lỗi phân tích tin nhắn từ ntfy:", e);
                    }
                };
                
                sse.onerror = function() {
                    console.warn("Mất kết nối server tín hiệu. Đang kết nối lại...");
                    if (!sseConnectedOnce) {
                        console.warn("SSE gặp lỗi kết nối ban đầu. Fallback sang Short Polling lập tức.");
                        try { sse.close(); } catch(e) {}
                        sse = null;
                        if (sseTimeout) clearTimeout(sseTimeout);
                        startShortPolling();
                    } else {
                        statusText.innerText = 'MẤT KẾT NỐI - ĐANG THỬ LẠI...';
                        statusDot.className = 'status-dot';
                    }
                };
            } else {
                console.warn("Trình duyệt không hỗ trợ EventSource. Dùng cơ chế Short Polling.");
                startShortPolling();
            }
            
            // Gửi tin nhắn nhịp tim đầu tiên lập tức để điện thoại nhận dạng ngay
            sendStatusToPhone({
                type: 'heartbeat',
                status: 'idle',
                tv_connected: true
            });
            
            // Bắt đầu gửi nhịp tim (Heartbeat) định kỳ
            startHeartbeat();
        }

        // 3. Gửi tin nhắn trạng thái lên ntfy.tedomum.fr (TV -> Điện thoại) dưới dạng phẳng
        function sendStatusToPhone(payload) {
            var topic = 'ntfy-phonetotv-' + pairCode + '-phone';
            var msgStr = "";
            if (payload.type === 'heartbeat') {
                msgStr = 'heartbeat|' + (payload.status || 'idle') + '|' + (payload.tv_connected ? 'true' : 'false');
            } else if (payload.type === 'status') {
                msgStr = 'status|' + (payload.status || 'paused') + '|' + Math.round(payload.currentTime || 0) + '|' + Math.round(payload.duration || 0) + '|' + (payload.speed || 1);
            } else {
                msgStr = JSON.stringify(payload);
            }
            httpPost('https://ntfy.tedomum.fr/' + topic, msgStr);
        }

        var lastSentStatus = '';
        var lastSentTime = -1;
        var progressInterval = null;
        var heartbeatInterval = null;

        function sendVideoStatus(force) {
            if (video.style.display !== 'block') return;
            
            var currentStatus = video.paused ? 'paused' : 'playing';
            var currentTime = video.currentTime;
            
            if (!force) {
                if (currentStatus === lastSentStatus && Math.abs(currentTime - lastSentTime) < 4) {
                    return;
                }
            }
            
            lastSentStatus = currentStatus;
            lastSentTime = currentTime;
            
            sendStatusToPhone({
                type: 'status',
                status: currentStatus,
                currentTime: currentTime,
                duration: video.duration || 0,
                speed: video.playbackRate
            });
        }

        function startProgressUpdates() {
            stopProgressUpdates();
            progressInterval = setInterval(function() {
                sendVideoStatus(false);
            }, 5000);
        }

        function stopProgressUpdates() {
            if (progressInterval) {
                clearInterval(progressInterval);
                progressInterval = null;
            }
        }

        // 4. Nhịp tim (Heartbeat) và cập nhật tiến trình phát
        function startHeartbeat() {
            if (heartbeatInterval) {
                clearInterval(heartbeatInterval);
            }
            // Gửi heartbeat định kỳ 15s khi rảnh
            heartbeatInterval = setInterval(function() {
                if (video.style.display !== 'block') {
                    sendStatusToPhone({
                        type: 'heartbeat',
                        status: 'idle',
                        tv_connected: true
                    });
                }
            }, 15000);
        }

        // Cơ chế Short Polling thay thế cho SSE nếu TV không hỗ trợ
        function startShortPolling() {
            if (isShortPollingActive) return;
            isShortPollingActive = true;
            
            var pollFunc = function() {
                var topic = 'ntfy-phonetotv-' + pairCode + '-tv';
                var pollUrl = 'https://ntfy.tedomum.fr/' + topic + '/json?poll=1';
                
                var xhr = new XMLHttpRequest();
                xhr.open('GET', pollUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status !== 200) {
                            console.warn("Short poll nhận mã trạng thái lỗi: HTTP " + xhr.status);
                            return;
                        }
                        try {
                            var responseText = xhr.responseText;
                            var lines = responseText.split('\n');
                            for (var i = 0; i < lines.length; i++) {
                                var line = lines[i].trim();
                                if (!line) continue;
                                
                                // Bọc try-catch riêng cho từng dòng JSON để tránh crash toàn bộ vòng lặp
                                try {
                                    var msg = JSON.parse(line);
                                    if (msg.event === 'message' && msg.message) {
                                        if (msg.id) {
                                            if (processedMsgIds[msg.id]) {
                                                continue;
                                            }
                                            processedMsgIds[msg.id] = true;
                                        }
                                        var payload = JSON.parse(msg.message);
                                        handleControlCommand(payload);
                                    }
                                } catch(innerErr) {
                                    // Bỏ qua dòng bị lỗi định dạng
                                }
                            }
                        } catch(e) {
                            console.error("Lỗi phân tích phản hồi short poll:", e);
                        }
                    }
                };
                xhr.send();
            };
            
            pollFunc();
            setInterval(pollFunc, 10000);
        }

        // 5. Xử lý các lệnh điều khiển từ điện thoại gửi xuống
        function handleControlCommand(cmd) {
            console.log("Nhận lệnh điều khiển:", cmd);
            
            // Xác nhận kết nối khi có bất kỳ gói dữ liệu nào từ điện thoại gửi sang
            if (!isPhoneConnected) {
                isPhoneConnected = true;
                statusDot.className = 'status-dot connected';
                statusText.innerText = 'ĐÃ ĐỒNG BỘ ĐIỆN THOẠI';
            }
            
            if (cmd.action === 'ping') {
                sendStatusToPhone({
                    type: 'heartbeat',
                    status: video.style.display === 'block' ? (video.paused ? 'paused' : 'playing') : 'idle',
                    currentTime: video.currentTime,
                    duration: video.duration || 0,
                    speed: video.playbackRate,
                    tv_connected: true
                });
            } else if (cmd.action === 'play') {
                if (cmd.url) {
                    loadAndPlayVideo(cmd.url, cmd.startTime || 0);
                } else {
                    video.play();
                }
            } else if (cmd.action === 'pause') {
                video.pause();
            } else if (cmd.action === 'seek') {
                video.currentTime = cmd.time;
            } else if (cmd.action === 'speed') {
                video.playbackRate = parseFloat(cmd.speed) || 1.0;
            }
        }

        // 6. Hàm tải video và giải mã (hỗ trợ cả HLS qua Hls.js và MP4 trực tiếp)
        function loadAndPlayVideo(url, startTime) {
            console.log("Bắt đầu tải video: " + url + " từ giây: " + startTime);
            
            // Hiển thị khung video, ẩn giao diện ghép đôi
            video.style.display = 'block';
            pairingUI.style.display = 'none';
            
            // Dọn dẹp luồng Hls cũ nếu có
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            var isHLS = url.indexOf('.m3u8') !== -1 || url.indexOf('m3u8') !== -1;
            
            if (isHLS) {
                var useNativeHLS = function() {
                    console.log("Kích hoạt dự phòng: Sử dụng trình phát HLS gốc của TV.");
                    if (hls) {
                        try { hls.destroy(); } catch(e) {}
                        hls = null;
                    }
                    video.src = url;
                    
                    var playStarted = false;
                    var onMetadata = function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                        playStarted = true;
                        video.removeEventListener('loadedmetadata', onMetadata);
                    };
                    video.addEventListener('loadedmetadata', onMetadata);
                    
                    // Fallback play trigger if metadata is delayed
                    setTimeout(function() {
                        if (!playStarted) {
                            video.play();
                        }
                    }, 2000);
                };

                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error("Lỗi giải mã HLS: " + data.type + " - " + data.details);
                        if (data.fatal) {
                            console.warn("Lỗi nghiêm trọng. Đang thử dự phòng phát gốc...");
                            useNativeHLS();
                        }
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl') || true) {
                    // Force native HLS player as general fallback on all other Smart TVs
                    useNativeHLS();
                } else {
                    alert("Trình duyệt TV này không hỗ trợ giải mã luồng video HLS.");
                }
            } else {
                // Tệp MP4 thường
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    if (startTime > 0) {
                        video.currentTime = startTime;
                    }
                    video.play();
                });
            }
        }

        // Lắng nghe sự kiện video để gửi trạng thái ngay lập tức (Event-driven)
        video.addEventListener('play', function() {
            sendVideoStatus(true);
            startProgressUpdates();
        });
        video.addEventListener('pause', function() {
            sendVideoStatus(true);
            stopProgressUpdates();
        });
        video.addEventListener('seeking', function() {
            sendVideoStatus(true);
        });
        video.addEventListener('ratechange', function() {
            sendVideoStatus(true);
        });

        // Bắt lỗi thẻ video
        video.addEventListener('error', function() {
            var err = video.error;
            var errMsg = "Lỗi video không xác định.";
            if (err) {
                if (err.code === 1) errMsg = "Phát video bị hủy ngang.";
                else if (err.code === 2) errMsg = "Lỗi kết nối mạng khi tải video (kiểm tra link / CORS / Chặn HTTPS).";
                else if (err.code === 3) errMsg = "Lỗi giải mã định dạng video.";
                else if (err.code === 4) errMsg = "Link video không hỗ trợ hoặc bị chặn (Mixed Content/Expired/CORS).";
            }
            console.error("LỖI PHÁT PHIM: " + errMsg + " (Mã lỗi: " + (err ? err.code : 'unknown') + ")");
        });

        // Tự động quay lại giao diện ghép đôi nếu video bị tắt hoặc kết thúc
        video.addEventListener('ended', function() {
            video.style.display = 'none';
            pairingUI.style.display = 'block';
        });

        // Khởi động giao diện
        generateCode();
    </script>
</body>
</html>
