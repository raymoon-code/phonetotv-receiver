<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneToTV - Web Receiver</title>
    <!-- Import thư viện hls.js để giải mã m3u8 trên các trình duyệt không hỗ trợ trực tiếp -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video styling */
        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            z-index: 10;
        }

        /* Glassmorphic Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 90%;
            max-width: 640px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 5;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        /* Pairing Code Display */
        .code-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .pairing-code {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 24px;
            font-family: "Courier New", Courier, monospace;
        }

        /* Instructions */
        .instructions {
            font-size: 16px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 32px;
        }

        .instructions span {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Status Indicator */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #e2e8f0;
            box-shadow: 0 0 8px #e2e8f0;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; box-shadow: 0 0 4px #10b981; }
            to { opacity: 1; box-shadow: 0 0 12px #10b981; }
        }

        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- Native HTML5 Video Element -->
    <video id="videoPlayer" controls autoplay playsinline></video>

    <!-- Glassmorphic Pairing UI -->
    <div class="glass-panel" id="pairingUI">
        <div class="logo">PHONETOTV RECEIVER</div>
        <div class="code-title">Mã ghép đôi của TV</div>
        <div class="pairing-code" id="codeDisplay">----</div>
        <p class="instructions">
            Mở ứng dụng <span>PhoneToTV</span> trên điện thoại của bạn,<br>
            chọn mục tiêu cast là <span>Web Browser</span> và nhập mã số ở trên.
        </p>
        <div class="status-container">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">ĐANG KHỞI TẠO...</div>
        </div>
    </div>

    <script>
        const video = document.getElementById('videoPlayer');
        const pairingUI = document.getElementById('pairingUI');
        const codeDisplay = document.getElementById('codeDisplay');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        
        let hls = null;
        let sse = null;
        let pairCode = '';
        let isPhoneConnected = false;
        let lastHeartbeatTime = Date.now();

        // 1. Tạo mã ngẫu nhiên 4 chữ số
        function generateCode() {
            pairCode = String(Math.floor(1000 + Math.random() * 9000));
            codeDisplay.innerText = pairCode;
            statusText.innerText = 'SẴN SÀNG GHÉP ĐÔI';
            initSignaling();
        }

        // 2. Thiết lập kênh tín hiệu (Signaling Channel) qua ntfy.sh SSE (Server-Sent Events)
        function initSignaling() {
            if (sse) sse.close();
            
            const topic = `ntfy-phonetotv-${pairCode}-tv`;
            const sseUrl = `https://ntfy.sh/${topic}/json`;
            
            console.log(`Subscribing to: ${sseUrl}`);
            sse = new EventSource(sseUrl);
            
            sse.onmessage = function(event) {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.event === 'message' && msg.message) {
                        const payload = JSON.parse(msg.message);
                        handleControlCommand(payload);
                    }
                } catch (e) {
                    console.error("Lỗi phân tích tin nhắn từ ntfy:", e);
                }
            };
            
            sse.onerror = function() {
                console.warn("Mất kết nối server tín hiệu. Đang kết nối lại...");
                statusText.innerText = 'MẤT KẾT NỐI - ĐANG THỬ LẠI...';
                statusDot.className = 'status-dot';
            };
            
            // Bắt đầu gửi nhịp tim (Heartbeat) định kỳ
            startHeartbeat();
        }

        // 3. Gửi tin nhắn trạng thái lên ntfy.sh (TV -> Điện thoại)
        function sendStatusToPhone(payload) {
            const topic = `ntfy-phonetotv-${pairCode}-phone`;
            fetch(`https://ntfy.sh/${topic}`, {
                method: 'POST',
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'application/json'
                }
            }).catch(err => console.error("Lỗi gửi trạng thái lên Cloud:", err));
        }

        // 4. Nhịp tim (Heartbeat) và cập nhật tiến trình phát
        function startHeartbeat() {
            // Gửi heartbeat định kỳ 5s khi rảnh
            setInterval(() => {
                if (video.style.display !== 'block') {
                    sendStatusToPhone({
                        type: 'heartbeat',
                        status: 'idle',
                        tv_connected: true
                    });
                }
            }, 5000);
            
            // Gửi tiến trình phát phim định kỳ 1.5s khi đang phát
            setInterval(() => {
                if (video.style.display === 'block') {
                    sendStatusToPhone({
                        type: 'status',
                        status: video.paused ? 'paused' : 'playing',
                        currentTime: video.currentTime,
                        duration: video.duration || 0,
                        speed: video.playbackRate
                    });
                }
            }, 15000 / 10); // 1.5s
        }

        // 5. Xử lý các lệnh điều khiển từ điện thoại gửi xuống
        function handleControlCommand(cmd) {
            console.log("Nhận lệnh điều khiển:", cmd);
            
            // Xác nhận kết nối khi có bất kỳ gói dữ liệu nào từ điện thoại gửi sang
            if (!isPhoneConnected) {
                isPhoneConnected = true;
                statusDot.className = 'status-dot connected';
                statusText.innerText = 'ĐÃ ĐỒNG BỘ ĐIỆN THOẠI';
            }
            
            if (cmd.action === 'play') {
                if (cmd.url) {
                    loadAndPlayVideo(cmd.url, cmd.startTime || 0);
                } else {
                    video.play();
                }
            } else if (cmd.action === 'pause') {
                video.pause();
            } else if (cmd.action === 'seek') {
                video.currentTime = cmd.time;
            } else if (cmd.action === 'speed') {
                video.playbackRate = parseFloat(cmd.speed) || 1.0;
            }
        }

        // 6. Hàm tải video và giải mã (hỗ trợ cả HLS qua Hls.js và MP4 trực tiếp)
        function loadAndPlayVideo(url, startTime) {
            console.log(`Tải video: ${url} từ giây: ${startTime}`);
            
            // Hiển thị khung video, ẩn giao diện ghép đôi
            video.style.display = 'block';
            pairingUI.style.display = 'none';
            
            // Dọn dẹp luồng Hls cũ nếu có
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            const isHLS = url.includes('.m3u8') || url.includes('m3u8');
            
            if (isHLS) {
                if (Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error("Lỗi giải mã HLS:", data);
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Hỗ trợ HLS mặc định (Safari trên iOS hoặc một số Smart TV cũ)
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                    });
                } else {
                    alert("Trình duyệt TV này không hỗ trợ giải mã luồng video HLS.");
                }
            } else {
                // Tệp MP4 thường
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    if (startTime > 0) {
                        video.currentTime = startTime;
                    }
                    video.play();
                });
            }
        }

        // Tự động quay lại giao diện ghép đôi nếu video bị tắt hoặc kết thúc
        video.addEventListener('ended', () => {
            video.style.display = 'none';
            pairingUI.style.display = 'block';
        });

        // Khởi động giao diện
        generateCode();
    </script>
</body>
</html>
