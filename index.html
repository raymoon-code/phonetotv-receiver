<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhoneToTV - Web Receiver</title>
    <!-- Import thư viện hls.js để giải mã m3u8 trên các trình duyệt không hỗ trợ trực tiếp -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Video styling */
        #videoPlayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: none;
            z-index: 10;
        }

        /* Glassmorphic Container */
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            width: 90%;
            max-width: 640px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            z-index: 5;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo */
        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(to right, #38bdf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        /* Pairing Code Display */
        .code-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #94a3b8;
            margin-bottom: 8px;
        }

        .pairing-code {
            font-size: 72px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #ffffff;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
            margin-bottom: 24px;
            font-family: "Courier New", Courier, monospace;
        }

        /* Instructions */
        .instructions {
            font-size: 16px;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 32px;
        }

        .instructions span {
            color: #38bdf8;
            font-weight: 600;
        }

        /* Status Indicator */
        .status-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #e2e8f0;
            box-shadow: 0 0 8px #e2e8f0;
        }

        .status-dot.connected {
            background-color: #10b981;
            box-shadow: 0 0 10px #10b981;
            animation: pulse 1.5s infinite alternate;
        }

        @keyframes pulse {
            from { opacity: 0.6; box-shadow: 0 0 4px #10b981; }
            to { opacity: 1; box-shadow: 0 0 12px #10b981; }
        }

        .status-text {
            font-size: 13px;
            font-weight: 600;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- Native HTML5 Video Element -->
    <video id="videoPlayer" controls autoplay playsinline></video>

    <!-- Glassmorphic Pairing UI -->
    <div class="glass-panel" id="pairingUI">
        <div class="logo">PHONETOTV RECEIVER</div>
        <div class="code-title">Mã ghép đôi của TV</div>
        <div class="pairing-code" id="codeDisplay">----</div>
        <p class="instructions">
            Mở ứng dụng <span>PhoneToTV</span> trên điện thoại của bạn,<br>
            chọn mục tiêu cast là <span>Web Browser</span> và nhập mã số ở trên.
        </p>
        <div class="status-container">
            <div class="status-dot" id="statusDot"></div>
            <div class="status-text" id="statusText">ĐANG KHỞI TẠO...</div>
        </div>
    </div>

    <!-- On-screen Developer Console for Smart TV debugging -->
    <div id="debugConsole" style="position: absolute; bottom: 10px; left: 10px; right: 10px; max-height: 150px; overflow-y: auto; background: rgba(0,0,0,0.85); color: #10b981; font-family: monospace; font-size: 11px; padding: 12px; border-radius: 12px; z-index: 100; text-align: left; border: 1px solid rgba(16, 185, 129, 0.25); display: none; word-break: break-all; pointer-events: none;"></div>

    <script>
        var video = document.getElementById('videoPlayer');
        var pairingUI = document.getElementById('pairingUI');
        var codeDisplay = document.getElementById('codeDisplay');
        var statusDot = document.getElementById('statusDot');
        var statusText = document.getElementById('statusText');
        var debugConsole = document.getElementById('debugConsole');
        
        function logToScreen(msg, type) {
            debugConsole.style.display = 'block';
            var div = document.createElement('div');
            var color = '#10b981'; // Green
            if (type === 'error') color = '#ef4444'; // Red
            if (type === 'warn') color = '#f59e0b'; // Yellow
            div.style.color = color;
            div.style.marginBottom = '4px';
            div.innerText = '[' + new Date().toLocaleTimeString() + '] ' + msg;
            debugConsole.appendChild(div);
            debugConsole.scrollTop = debugConsole.scrollHeight;
        }

        // Hook console methods
        var _log = console.log;
        var _error = console.error;
        var _warn = console.warn;
        
        console.log = function() {
            var args = Array.prototype.slice.call(arguments);
            _log.apply(console, args);
            logToScreen(args.join(' '), 'log');
        };
        console.error = function() {
            var args = Array.prototype.slice.call(arguments);
            _error.apply(console, args);
            logToScreen(args.join(' '), 'error');
        };
        console.warn = function() {
            var args = Array.prototype.slice.call(arguments);
            _warn.apply(console, args);
            logToScreen(args.join(' '), 'warn');
        };

        // Window error tracking
        window.onerror = function(message, source, lineno, colno, error) {
            console.error("Runtime: " + message + " at " + source + ":" + lineno);
            return false;
        };
        
        var hls = null;
        var sse = null;
        var pairCode = '';
        var isPhoneConnected = false;
        var lastHeartbeatTime = Date.now();

        // 1. Tạo mã ngẫu nhiên 4 chữ số
        function generateCode() {
            pairCode = String(Math.floor(1000 + Math.random() * 9000));
            codeDisplay.innerText = pairCode;
            statusText.innerText = 'SẴN SÀNG GHÉP ĐÔI';
            initSignaling();
        }

        // Helper gửi HTTP POST tương thích ngược (fetch hoặc XHR)
        function httpPost(url, payload) {
            var bodyString = JSON.stringify(payload);
            if (window.fetch) {
                fetch(url, {
                    method: 'POST',
                    body: bodyString,
                    headers: {
                        'Content-Type': 'text/plain; charset=utf-8'
                    }
                })['catch'](function(err) {
                    console.error("Lỗi gửi HTTP POST (fetch):", err);
                });
            } else {
                var xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                xhr.setRequestHeader('Content-Type', 'text/plain; charset=utf-8');
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status !== 200) {
                        console.error("Lỗi gửi HTTP POST (XHR): status " + xhr.status);
                    }
                };
                xhr.send(bodyString);
            }
        }

        // 2. Thiết lập kênh tín hiệu (Signaling Channel) qua ntfy.sh SSE (Server-Sent Events)
        function initSignaling() {
            if (sse) {
                try { sse.close(); } catch(e) {}
            }
            
            var topic = 'ntfy-phonetotv-' + pairCode + '-tv';
            var sseUrl = 'https://ntfy.sh/' + topic + '/json';
            
            console.log("Subscribing to: " + sseUrl);
            
            if (typeof EventSource !== 'undefined') {
                sse = new EventSource(sseUrl);
                
                sse.onmessage = function(event) {
                    try {
                        var msg = JSON.parse(event.data);
                        if (msg.event === 'message' && msg.message) {
                            var payload = JSON.parse(msg.message);
                            handleControlCommand(payload);
                        }
                    } catch (e) {
                        console.error("Lỗi phân tích tin nhắn từ ntfy:", e);
                    }
                };
                
                sse.onerror = function() {
                    console.warn("Mất kết nối server tín hiệu. Đang kết nối lại...");
                    statusText.innerText = 'MẤT KẾT NỐI - ĐANG THỬ LẠI...';
                    statusDot.className = 'status-dot';
                };
            } else {
                // TV quá cũ không hỗ trợ EventSource -> Chuyển sang Short Polling (3 giây một lần)
                console.warn("Trình duyệt không hỗ trợ EventSource. Dùng cơ chế Short Polling.");
                statusText.innerText = 'CHẾ ĐỘ SHORT POLLING...';
                startShortPolling();
            }
            
            // Gửi tin nhắn nhịp tim đầu tiên lập tức để điện thoại nhận dạng ngay
            sendStatusToPhone({
                type: 'heartbeat',
                status: 'idle',
                tv_connected: true
            });
            
            // Bắt đầu gửi nhịp tim (Heartbeat) định kỳ
            startHeartbeat();
        }

        // 3. Gửi tin nhắn trạng thái lên ntfy.sh (TV -> Điện thoại)
        function sendStatusToPhone(payload) {
            var topic = 'ntfy-phonetotv-' + pairCode + '-phone';
            httpPost('https://ntfy.sh/' + topic, payload);
        }

        // 4. Nhịp tim (Heartbeat) và cập nhật tiến trình phát
        function startHeartbeat() {
            // Gửi heartbeat định kỳ 5s khi rảnh
            setInterval(function() {
                if (video.style.display !== 'block') {
                    sendStatusToPhone({
                        type: 'heartbeat',
                        status: 'idle',
                        tv_connected: true
                    });
                }
            }, 5000);
            
            // Gửi tiến trình phát phim định kỳ 1.5s khi đang phát
            setInterval(function() {
                if (video.style.display === 'block') {
                    sendStatusToPhone({
                        type: 'status',
                        status: video.paused ? 'paused' : 'playing',
                        currentTime: video.currentTime,
                        duration: video.duration || 0,
                        speed: video.playbackRate
                    });
                }
            }, 1500);
        }

        // Cơ chế Short Polling thay thế cho SSE nếu TV không hỗ trợ
        function startShortPolling() {
            setInterval(function() {
                var topic = 'ntfy-phonetotv-' + pairCode + '-tv';
                var pollUrl = 'https://ntfy.sh/' + topic + '/json?poll=1';
                
                var xhr = new XMLHttpRequest();
                xhr.open('GET', pollUrl, true);
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4 && xhr.status === 200) {
                        try {
                            var responseText = xhr.responseText;
                            var lines = responseText.split('\n');
                            for (var i = 0; i < lines.length; i++) {
                                var line = lines[i].trim();
                                if (!line) continue;
                                var msg = JSON.parse(line);
                                if (msg.event === 'message' && msg.message) {
                                    var payload = JSON.parse(msg.message);
                                    handleControlCommand(payload);
                                }
                            }
                        } catch(e) {
                            console.error("Lỗi short poll:", e);
                        }
                    }
                };
                xhr.send();
            }, 3000);
        }

        // 5. Xử lý các lệnh điều khiển từ điện thoại gửi xuống
        function handleControlCommand(cmd) {
            console.log("Nhận lệnh điều khiển:", cmd);
            
            // Xác nhận kết nối khi có bất kỳ gói dữ liệu nào từ điện thoại gửi sang
            if (!isPhoneConnected) {
                isPhoneConnected = true;
                statusDot.className = 'status-dot connected';
                statusText.innerText = 'ĐÃ ĐỒNG BỘ ĐIỆN THOẠI';
            }
            
            if (cmd.action === 'play') {
                if (cmd.url) {
                    loadAndPlayVideo(cmd.url, cmd.startTime || 0);
                } else {
                    video.play();
                }
            } else if (cmd.action === 'pause') {
                video.pause();
            } else if (cmd.action === 'seek') {
                video.currentTime = cmd.time;
            } else if (cmd.action === 'speed') {
                video.playbackRate = parseFloat(cmd.speed) || 1.0;
            }
        }

        // 6. Hàm tải video và giải mã (hỗ trợ cả HLS qua Hls.js và MP4 trực tiếp)
        function loadAndPlayVideo(url, startTime) {
            // Tự động nâng cấp sang HTTPS nếu trang chính chạy trên HTTPS nhằm tránh lỗi Mixed Content
            if (window.location.protocol === 'https:' && url.indexOf('http://') === 0) {
                var secureUrl = url.replace('http://', 'https://');
                console.warn("Đang tự động nâng cấp URL sang HTTPS để tránh lỗi Mixed Content: " + secureUrl);
                url = secureUrl;
            }
            
            console.log("Bắt đầu tải video: " + url + " từ giây: " + startTime);
            
            // Hiển thị khung video, ẩn giao diện ghép đôi
            video.style.display = 'block';
            pairingUI.style.display = 'none';
            
            // Dọn dẹp luồng Hls cũ nếu có
            if (hls) {
                hls.destroy();
                hls = null;
            }
            
            var isHLS = url.indexOf('.m3u8') !== -1 || url.indexOf('m3u8') !== -1;
            
            if (isHLS) {
                if (typeof Hls !== 'undefined' && Hls.isSupported()) {
                    hls = new Hls({
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                    });
                    hls.on(Hls.Events.ERROR, function(event, data) {
                        console.error("Lỗi giải mã HLS: " + data.type + " - " + data.details);
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Hỗ trợ HLS mặc định (Safari trên iOS hoặc một số Smart TV cũ)
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        if (startTime > 0) {
                            video.currentTime = startTime;
                        }
                        video.play();
                    });
                } else {
                    alert("Trình duyệt TV này không hỗ trợ giải mã luồng video HLS.");
                }
            } else {
                // Tệp MP4 thường
                video.src = url;
                video.addEventListener('loadedmetadata', function() {
                    if (startTime > 0) {
                        video.currentTime = startTime;
                    }
                    video.play();
                });
            }
        }

        // Bắt lỗi thẻ video
        video.addEventListener('error', function() {
            var err = video.error;
            var errMsg = "Lỗi video không xác định.";
            if (err) {
                if (err.code === 1) errMsg = "Phát video bị hủy ngang.";
                else if (err.code === 2) errMsg = "Lỗi kết nối mạng khi tải video (kiểm tra link / CORS / Chặn HTTPS).";
                else if (err.code === 3) errMsg = "Lỗi giải mã định dạng video.";
                else if (err.code === 4) errMsg = "Link video không hỗ trợ hoặc bị chặn (Mixed Content/Expired/CORS).";
            }
            console.error("LỖI PHÁT PHIM: " + errMsg + " (Mã lỗi: " + (err ? err.code : 'unknown') + ")");
        });

        // Tự động quay lại giao diện ghép đôi nếu video bị tắt hoặc kết thúc
        video.addEventListener('ended', function() {
            video.style.display = 'none';
            pairingUI.style.display = 'block';
        });

        // Khởi động giao diện
        generateCode();
    </script>
</body>
</html>
